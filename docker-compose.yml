services:
  mock-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "-m", "mock_backend.run"]
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 5001
      BACKEND_DEBUG: ${BACKEND_DEBUG:-1}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mock-backend
    ports:
      - "${PORT:-8000}:8000"
    environment:
      BACKEND_URL: http://mock-backend:5001
      HOST: 0.0.0.0
      PORT: 8000
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
