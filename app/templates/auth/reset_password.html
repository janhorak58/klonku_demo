{% extends 'layouts/auth.html' %}

{% block title %}Klonku — Reset hesla{% endblock %}

{% block auth_content %}
<div class="form-header">
  <h1>Nastavit nové heslo</h1>
  <p>Zadej nové heslo a vrať se zpět na přihlášení.</p>
</div>

<form method="post" class="stack-form">
  <div class="field">
    <label for="password">Nové heslo</label>
    <input type="password" id="password" name="password" placeholder="Nové heslo">
  </div>
  <div class="field">
    <label for="password-confirm">Potvrzení hesla</label>
    <input type="password" id="password-confirm" name="password_confirm" placeholder="Zopakuj nové heslo">
  </div>
  <button type="submit" class="btn-primary btn-full">Uložit heslo</button>
</form>
{% endblock %}
